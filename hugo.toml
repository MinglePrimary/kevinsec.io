baseURL = "https://kevinsec.io/"
languageCode = "en-us"
title = "KevinSec"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = "production"
title = "KevinSec"
description = "KevinSec is a cybersecurity blog focused on web security, penetration testing, red team research, and practical security engineering."
keywords = ["cybersecurity", "penetration testing", "web security", "red team", "application security", "KevinSec"]
author = "KevinSec"
DateFormat = "January 2, 2006"
defaultTheme = "Dark"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false


[menu]
[[menu.main]]
identifier = "blog"
name = "Blog"
url = "/blog/"
weight = 10

[[menu.main]]
identifier = "research"
name = "Research"
url = "/research/"
weight = 20

[[menu.main]]
identifier = "services"
name = "Services"
url = "/services/"
weight = 30

[[menu.main]]
identifier = "about"
name = "About"
url = "/about/"
weight = 40

[[menu.main]]
identifier = "archive"
name = "Archive"
url = "/archive/"
weight = 40

[[menu.main]]
identifier = "contact"
name = "Contact"
url = "/contact/"
weight = 50

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 90

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true